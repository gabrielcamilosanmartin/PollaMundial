{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Polla Mundial{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
    {% block content %}{% endblock %}

    <!-- Formatea las fechas (<time data-utc>) a la zona horaria local del usuario -->
    <script>
        document.querySelectorAll("time[data-utc]").forEach(function (el) {
            var iso = el.getAttribute("data-utc");
            if (!iso) return;
            var d = new Date(iso);
            if (isNaN(d.getTime())) return;
            el.textContent = d.toLocaleString([], {
                dateStyle: "medium",
                timeStyle: "short",
            });
        });
    </script>
</body>
</html>
