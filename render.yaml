# Blueprint de Render: web service (Python nativo) + PostgreSQL gestionado.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pollamundial
    runtime: python
    plan: free
    branch: main
    buildCommand: "bash build.sh"
    startCommand: "gunicorn pollamundial.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pollamundial-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "4"

databases:
  - name: pollamundial-db
    plan: free
    databaseName: pollamundial
    user: pollamundial
