# Blueprint de Render para la instancia "Polla Familiar".
# Usa una base de datos externa de Neon (Render free solo permite una BD
# gestionada, ya usada por la instancia principal), configurada vía DATABASE_URL.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: polla-familiar
    runtime: python
    plan: free
    branch: polla-familiar
    buildCommand: "bash build.sh"
    startCommand: "gunicorn pollamundial.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Cadena de conexión de Neon (postgres://...). Se pega en el panel de Render.
      - key: DATABASE_URL
        sync: false
      - key: WEB_CONCURRENCY
        value: "4"
      # Superusuario inicial (se crea en el deploy si no existe).
      # Define el usuario y la contraseña en el panel de Render.
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
